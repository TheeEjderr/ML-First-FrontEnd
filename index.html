<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        padding: 50px;
    }
    input[type="text"] {
        width: 100%;
        padding: 12px 15px;
        margin: 8px 0;
        display: inline-block;
        border: 2px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        transition: 0.3s;
        outline: none;
        font-size: 16px;
    }
    input[type="text"]:focus {
        border-color: #2ecc71; 
        box-shadow: 0 0 8px rgba(46, 204, 113, 0.3);
    }
    input[type="button"] {
        width: 100%;
        background-color: #2c3e50; 
        color: white;
        padding: 14px 20px;
        margin: 15px 0;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        text-transform: uppercase;
        transition: background-color 0.3s, transform 0.1s;
    }
    input[type="button"]:hover {
        background-color: #34495e;
    }
    input[type="button"]:active {
        transform: scale(0.98);
    }
    .footer {
    margin-top: 25px;
    text-align: center;
    font-size: 14px;
    color: #7f8c8d;
    border-top: 1px solid #eee;
    padding-top: 15px;
}
.footer strong {
    color: #2c3e50;
}
.footer a {
    color: #3498db;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}
.footer a:hover {
    color: #2980b9;
    text-decoration: underline;
}
</style>
<body>
    
    <div id="form">
        <label for="">Age</label>
        <input type="text" name="age" id="age">
        <label for="">Sleep</label>
        <input type="text" name="sleep" id="sleep">
        <label for="">Activity</label>
        <input type="text" name="activity" id="activity">
        <label for="">(Male = 1 , Female = 0)</label>
        <input type="text" name="male" id="male">
        <input type="button" value="Send" onclick="getinfo()">
    </div>
    <div class="footer">
        Created by <strong>The Ejder</strong> | <a href="https://theeejderr.github.io/My-Page/" target="_blank">Portfolio</a>
    </div>
</body>
<script>
function getinfo()
{
    fetch("https://ml-project-first.onrender.com/predict", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
        age: 25,
        sleep: 7,
        activity: 3,
        male: 1
    })
    })
    .then(res => res.json())
    .then(data => console.log(data))
}
</script>
</html>
